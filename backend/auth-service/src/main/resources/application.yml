server:
  port: 8081

spring:
  application:
    name: auth-service
  servlet:
    multipart:
      enabled: true
      max-file-size: 50MB
      max-request-size: 50MB
  cloud:
    config:
      enabled: false
  cache:
    type: none
  # Redis cache désactivé temporairement
  # cache:
  #   type: redis
  #   redis:
  #     time-to-live: 3600000
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      timeout: 2000ms
      lettuce:
        pool:
          max-active: 8
          max-idle: 8
          min-idle: 0
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/englishflow_identity}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
  h2:
    console:
      enabled: false
  mail:
    host: smtp.gmail.com
    port: 587
    username: ${MAIL_USERNAME}
    password: ${MAIL_PASSWORD}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
            required: true
          connectiontimeout: 5000
          timeout: 5000
          writetimeout: 5000
  security:
    oauth2:
      client:
        registration:
          google:
            client-id: ${GOOGLE_CLIENT_ID}
            client-secret: ${GOOGLE_CLIENT_SECRET}
            scope:
              - email
              - profile
            redirect-uri: "{baseUrl}/login/oauth2/code/{registrationId}"
            authorization-grant-type: authorization_code
            client-name: Google
        provider:
          google:
            authorization-uri: https://accounts.google.com/o/oauth2/v2/auth
            token-uri: https://oauth2.googleapis.com/token
            user-info-uri: https://www.googleapis.com/oauth2/v3/userinfo
            user-name-attribute: sub

app:
  frontend:
    url: ${FRONTEND_URL:http://localhost:4200}
  backend:
    url: ${BACKEND_URL:http://localhost:8081}

file:
  upload-dir: uploads/profile-photos

# Meeting platforms configuration
meeting:
  google:
    enabled: ${GOOGLE_MEET_ENABLED:false}
    credentials-file: ${GOOGLE_CALENDAR_CREDENTIALS_FILE:#{null}}
    oauth-credentials-file: ${GOOGLE_OAUTH_CREDENTIALS_FILE:credentials/google-oauth-credentials.json}
    use-oauth: ${GOOGLE_USE_OAUTH:true}
    tokens-directory: ${GOOGLE_TOKENS_DIRECTORY:tokens}
  zoom:
    enabled: ${ZOOM_ENABLED:false}
    account-id: ${ZOOM_ACCOUNT_ID:#{null}}
    client-id: ${ZOOM_CLIENT_ID:#{null}}
    client-secret: ${ZOOM_CLIENT_SECRET:#{null}}
  teams:
    enabled: ${TEAMS_ENABLED:false}
    tenant-id: ${TEAMS_TENANT_ID:#{null}}
    client-id: ${TEAMS_CLIENT_ID:#{null}}
    client-secret: ${TEAMS_CLIENT_SECRET:#{null}}

recaptcha:
  secret: ${RECAPTCHA_SECRET}

jwt:
  secret: ${JWT_SECRET:englishflow-jwt-secret-key-for-development-only-change-in-production-minimum-256-bits}
  expiration: ${JWT_EXPIRATION:86400000}
  refresh-expiration: ${JWT_REFRESH_EXPIRATION:604800000}

# ML Service Configuration
ml:
  service:
    url: ${ML_SERVICE_URL:http://localhost:5000}

eureka:
  client:
    enabled: true
    service-url:
      defaultZone: http://localhost:8761/eureka/
    register-with-eureka: true
    fetch-registry: true
    # Intervalle de récupération du registre (par défaut 30s, réduit à 5s)
    registry-fetch-interval-seconds: 5
    # Activer le healthcheck
    healthcheck:
      enabled: true
    # Désactiver le cache local pour un rafraîchissement immédiat
    disable-delta: false
  instance:
    prefer-ip-address: true
    # Intervalle de heartbeat (par défaut 30s, réduit à 5s)
    lease-renewal-interval-in-seconds: 5
    # Durée avant expiration (par défaut 90s, réduit à 10s)
    lease-expiration-duration-in-seconds: 10
    # Métadonnées pour identifier l'instance avec le port
    instance-id: ${spring.application.name}:${random.value}:${server.port}
    # Statut initial
    initial-status: STARTING
    # Activer le healthcheck endpoint
    health-check-url-path: /actuator/health

# Swagger/OpenAPI Configuration
springdoc:
  api-docs:
    path: /api-docs
    enabled: true
  swagger-ui:
    path: /swagger-ui.html
    enabled: true
    tags-sorter: alpha
    operations-sorter: alpha
    display-request-duration: true
    doc-expansion: none
  show-actuator: true
  default-consumes-media-type: application/json
  default-produces-media-type: application/json

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
      base-path: /actuator
  endpoint:
    health:
      show-details: always
      probes:
        enabled: true
    metrics:
      enabled: true
    prometheus:
      enabled: true
  metrics:
    export:
      prometheus:
        enabled: true
    distribution:
      percentiles-histogram:
        http.server.requests: true
    tags:
      application: ${spring.application.name}
      environment: ${ENVIRONMENT:dev}
  health:
    livenessState:
      enabled: true
    readinessState:
      enabled: true
    redis:
      enabled: false
  tracing:
    sampling:
      probability: 1.0
  zipkin:
    base-url: http://localhost:9411
    enabled: true
    service:
      name: ${spring.application.name}

# Logging Configuration
logging:
  level:
    root: INFO
    com.englishflow.auth: DEBUG
    org.springframework.security: DEBUG
    org.springframework.web: INFO
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} - %msg%n"
  file:
    name: logs/auth-service.log
    max-size: 10MB
    max-history: 30


---
# Docker profile
spring:
  config:
    activate:
      on-profile: docker
  datasource:
    url: jdbc:postgresql://postgres:5432/englishflow_identity
  data:
    redis:
      host: redis

management:
  zipkin:
    tracing:
      endpoint: http://jaeger:9411/api/v2/spans

eureka:
  client:
    service-url:
      defaultZone: http://eureka-server:8761/eureka/
