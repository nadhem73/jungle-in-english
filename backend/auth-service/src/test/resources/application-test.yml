spring:
  datasource:
    url: jdbc:h2:mem:testdb
    driver-class-name: org.h2.Driver
    username: sa
    password: 
  
  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: false
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.H2Dialect
  
  h2:
    console:
      enabled: false
  
  mail:
    host: localhost
    port: 1025
    username: test
    password: test
  
  data:
    redis:
      host: localhost
      port: 6379
  
  cache:
    type: simple

jwt:
  secret: testSecretKeyForJWTTokenGenerationThatIsLongEnoughForHS512Algorithm
  expiration: 86400000
  temp:
    expiration: 300000

recaptcha:
  secret: test-recaptcha-secret-key
  verify-url: https://www.google.com/recaptcha/api/siteverify

file:
  upload-dir: ./test-uploads

eureka:
  client:
    enabled: false

logging:
  level:
    root: WARN
    com.englishflow.auth: INFO
