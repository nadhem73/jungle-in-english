spring:
  application:
    name: club-service
  
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:englishflow_jungle_club_db}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 5
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000
  
  jpa:
    hibernate:
      ddl-auto: ${JPA_DDL_AUTO:update}
    show-sql: ${JPA_SHOW_SQL:false}
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: ${JPA_FORMAT_SQL:false}
        jdbc:
          batch_size: 20
        order_inserts: true
        order_updates: true
        query:
          in_clause_parameter_padding: true
    generate-ddl: true
    open-in-view: false
  
  cloud:
    config:
      enabled: false
  
  cache:
    type: caffeine
    caffeine:
      spec: maximumSize=500,expireAfterWrite=300s

server:
  port: ${SERVER_PORT:8085}
  compression:
    enabled: true
    mime-types: application/json,application/xml,text/html,text/xml,text/plain
  http2:
    enabled: true

# Auth Service Configuration
auth:
  service:
    url: ${AUTH_SERVICE_URL:http://localhost:8081}

# JWT Configuration
jwt:
  secret: ${JWT_SECRET:englishflow-jwt-secret-key-for-development-only-change-in-production-minimum-256-bits}
  expiration: ${JWT_EXPIRATION:86400000}

# Internal Service Communication
internal:
  service:
    key: ${INTERNAL_SERVICE_KEY:englishflow-internal-service-secret-key-change-in-production-minimum-256-bits}

# Konnect Payment Configuration
konnect:
  api-url: https://api.preprod.konnect.network/api/v2/payments/init-payment
  api-key: ${KONNECT_API_KEY:69d1070fcd2bd9f6adb45cd4:wHR0Qb4vprpg49tiiJ6zgSNrZb3d}
  wallet-id: ${KONNECT_WALLET_ID:69d10712cd2bd9f6adb45cfe}

app:
  frontend:
    url: ${FRONTEND_URL:http://localhost:4200}

eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_SERVER_URL:http://localhost:8761/eureka/}
    fetch-registry: true
    register-with-eureka: true
    # Intervalle de récupération du registre (par défaut 30s, réduit à 5s)
    registry-fetch-interval-seconds: 5
    # Activer le healthcheck
    healthcheck:
      enabled: true
    # Désactiver le cache local pour un rafraîchissement immédiat
    disable-delta: false
  instance:
    prefer-ip-address: true
    # Intervalle de heartbeat (par défaut 30s, réduit à 5s)
    lease-renewal-interval-in-seconds: 5
    # Durée avant expiration (par défaut 90s, réduit à 10s)
    lease-expiration-duration-in-seconds: 10
    # Métadonnées pour identifier l'instance avec le port
    instance-id: ${spring.application.name}:${random.value}:${server.port}
    # Statut initial
    initial-status: STARTING
    # Activer le healthcheck endpoint
    health-check-url-path: /actuator/health

# Swagger/OpenAPI Configuration
springdoc:
  api-docs:
    path: /api-docs
    enabled: true
  swagger-ui:
    path: /swagger-ui.html
    enabled: true
    tags-sorter: alpha
    operations-sorter: alpha
    display-request-duration: true
    doc-expansion: none
  show-actuator: true
  default-consumes-media-type: application/json
  default-produces-media-type: application/json

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
      base-path: /actuator
  endpoint:
    health:
      show-details: always
      probes:
        enabled: true
    metrics:
      enabled: true
    prometheus:
      enabled: true
  metrics:
    export:
      prometheus:
        enabled: true
    distribution:
      percentiles-histogram:
        http.server.requests: true
    tags:
      application: ${spring.application.name}
      environment: ${ENVIRONMENT:dev}
  health:
    livenessState:
      enabled: true
    readinessState:
      enabled: true
  tracing:
    sampling:
      probability: 1.0
  zipkin:
    base-url: http://localhost:9411
    enabled: true
    service:
      name: ${spring.application.name}

# Logging Configuration
logging:
  level:
    root: ${LOG_LEVEL_ROOT:INFO}
    com.englishflow.club: ${LOG_LEVEL_APP:DEBUG}
    com.englishflow.club.config.FeignConfig: DEBUG
    feign: DEBUG
    org.hibernate.SQL: ${LOG_LEVEL_SQL:WARN}
    org.hibernate.type.descriptor.sql.BasicBinder: ${LOG_LEVEL_SQL_BINDER:WARN}
    org.springframework.web: INFO
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"
  file:
    name: logs/club-service.log
    max-size: 10MB
    max-history: 30

---
# Docker profile
spring:
  config:
    activate:
      on-profile: docker

management:
  zipkin:
    tracing:
      endpoint: http://jaeger:9411/api/v2/spans
