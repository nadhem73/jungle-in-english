server:
  port: ${SERVER_PORT:8087}

spring:
  application:
    name: complaints-service
  cloud:
    config:
      enabled: false
  datasource:
    url: jdbc:postgresql://localhost:5432/englishflow_complaints
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver
  
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
    generate-ddl: true
  
  jackson:
    serialization:
      write-dates-as-timestamps: false
    time-zone: UTC
    date-format: yyyy-MM-dd'T'HH:mm:ss.SSS

# JWT Configuration
jwt:
  secret: ${JWT_SECRET:englishflow-jwt-secret-key-for-development-only-change-in-production-minimum-256-bits}
  expiration: ${JWT_EXPIRATION:86400000}

# Internal Service Communication
internal:
  service:
    key: ${INTERNAL_SERVICE_KEY:englishflow-internal-service-secret-key-change-in-production-minimum-256-bits}

logging:
  level:
    com.englishflow.complaints: DEBUG
    org.hibernate.SQL: DEBUG
    org.hibernate.type.descriptor.sql.BasicBinder: TRACE



eureka:
  client:
    enabled: true
    service-url:
      defaultZone: ${EUREKA_SERVER_URL:http://localhost:8761/eureka/}
    register-with-eureka: true
    fetch-registry: true
    # Intervalle de récupération du registre (par défaut 30s, réduit à 5s)
    registry-fetch-interval-seconds: 5
    # Activer le healthcheck
    healthcheck:
      enabled: true
    # Désactiver le cache local pour un rafraîchissement immédiat
    disable-delta: false
  instance:
    prefer-ip-address: true
    # Intervalle de heartbeat (par défaut 30s, réduit à 5s)
    lease-renewal-interval-in-seconds: 5
    # Durée avant expiration (par défaut 90s, réduit à 10s)
    lease-expiration-duration-in-seconds: 10
    # Métadonnées pour identifier l'instance avec le port
    instance-id: ${spring.application.name}:${random.value}:${server.port}
    # Statut initial
    initial-status: STARTING
    # Activer le healthcheck endpoint
    health-check-url-path: /actuator/health

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
      base-path: /actuator
  endpoint:
    health:
      show-details: always
      probes:
        enabled: true
    metrics:
      enabled: true
    prometheus:
      enabled: true
  metrics:
    export:
      prometheus:
        enabled: true
    distribution:
      percentiles-histogram:
        http.server.requests: true
    tags:
      application: ${spring.application.name}
      environment: ${ENVIRONMENT:dev}
  health:
    livenessState:
      enabled: true
    readinessState:
      enabled: true
  tracing:
    sampling:
      probability: 1.0
  zipkin:
    base-url: http://localhost:9411
    enabled: true
    service:
      name: ${spring.application.name}

# Auth Service Configuration
auth:
  service:
    url: ${AUTH_SERVICE_URL:http://localhost:8080/api/auth}

# Swagger/OpenAPI Configuration
springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
    enabled: true

---
spring:
  config:
    activate:
      on-profile: docker
  datasource:
    url: jdbc:postgresql://postgres:5432/englishflow_complaints

management:
  zipkin:
    tracing:
      endpoint: http://jaeger:9411/api/v2/spans
  
eureka:
  client:
    service-url:
      defaultZone: http://eureka-server:8761/eureka/
  instance:
    prefer-ip-address: ${EUREKA_INSTANCE_PREFER_IP_ADDRESS:true}
    hostname: ${EUREKA_INSTANCE_HOSTNAME:complaints-service}
