server:
  port: 0

spring:
  application:
    name: api-gateway
  
  cloud:
    config:
      enabled: false
    gateway:
      discovery:
        locator:
          enabled: false
      routes: []

eureka:
  client:
    enabled: false
    register-with-eureka: false
    fetch-registry: false

management:
  endpoints:
    web:
      exposure:
        include: health,info

jwt:
  secret: test-secret-key-for-testing-only-minimum-256-bits-required-for-jwt-token-generation

logging:
  level:
    root: WARN
    org.springframework.cloud.gateway: INFO
