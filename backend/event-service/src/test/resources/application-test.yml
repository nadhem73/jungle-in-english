spring:
  datasource:
    url: jdbc:h2:mem:testdb
    driver-class-name: org.h2.Driver
    username: sa
    password:
  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect
  cache:
    type: none

jwt:
  secret: test-secret-key-for-testing-only-minimum-256-bits-required-for-jwt-token-generation

internal:
  service:
    key: test-internal-service-key
