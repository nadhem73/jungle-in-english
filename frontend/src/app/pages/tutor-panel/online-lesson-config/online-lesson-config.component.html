<div class="min-h-screen bg-gradient-to-br from-blue-50 to-indigo-100 dark:from-gray-900 dark:to-gray-800 p-6">
  <div class="max-w-2xl mx-auto">
    <!-- Header -->
    <div class="mb-8">
      <button (click)="goBack()" class="flex items-center gap-2 text-blue-600 dark:text-blue-400 hover:text-blue-700 mb-4">
        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"/>
        </svg>
        Back
      </button>
      <h1 class="text-4xl font-bold text-gray-900 dark:text-white mb-2">Configure Online Lesson</h1>
      <p class="text-gray-600 dark:text-gray-400">Set up recurring schedules for your online sessions</p>
    </div>

    <!-- Message -->
    <div *ngIf="message" [class]="'mb-6 p-4 rounded-lg ' + (messageType === 'success' ? 'bg-emerald-100 text-emerald-700 dark:bg-emerald-900/30 dark:text-emerald-300' : 'bg-red-100 text-red-700 dark:bg-red-900/30 dark:text-red-300')">
      {{ message }}
    </div>

    <!-- Main Card -->
    <div class="bg-white dark:bg-gray-800 rounded-2xl shadow-xl p-8 space-y-6">
      
      <!-- Duration -->
      <div>
        <label class="block text-sm font-semibold text-gray-700 dark:text-gray-300 mb-2">
          Session Duration (minutes) <span class="text-red-500">*</span>
        </label>
        <input type="number" [(ngModel)]="config.duration" min="15" max="480"
          class="w-full px-4 py-3 border-2 border-gray-300 dark:border-gray-600 rounded-xl focus:ring-2 focus:ring-blue-500 focus:border-transparent dark:bg-gray-700 dark:text-white"
          placeholder="90">
      </div>

      <!-- Timezone -->
      <div>
        <label class="block text-sm font-semibold text-gray-700 dark:text-gray-300 mb-2">
          Timezone <span class="text-red-500">*</span>
        </label>
        <select [(ngModel)]="config.timezone"
          class="w-full px-4 py-3 border-2 border-gray-300 dark:border-gray-600 rounded-xl focus:ring-2 focus:ring-blue-500 focus:border-transparent dark:bg-gray-700 dark:text-white">
          <option *ngFor="let tz of timezones" [value]="tz">{{ tz }}</option>
        </select>
      </div>

      <!-- Date Range -->
      <div class="grid grid-cols-2 gap-4">
        <div>
          <label class="block text-sm font-semibold text-gray-700 dark:text-gray-300 mb-2">
            Start Date <span class="text-red-500">*</span>
          </label>
          <input type="date" [(ngModel)]="config.startDate"
            class="w-full px-4 py-3 border-2 border-gray-300 dark:border-gray-600 rounded-xl focus:ring-2 focus:ring-blue-500 focus:border-transparent dark:bg-gray-700 dark:text-white">
        </div>
        <div>
          <label class="block text-sm font-semibold text-gray-700 dark:text-gray-300 mb-2">
            End Date <span class="text-red-500">*</span>
          </label>
          <input type="date" [(ngModel)]="config.endDate"
            class="w-full px-4 py-3 border-2 border-gray-300 dark:border-gray-600 rounded-xl focus:ring-2 focus:ring-blue-500 focus:border-transparent dark:bg-gray-700 dark:text-white">
        </div>
      </div>

      <!-- Schedules Section -->
      <div class="border-t-2 border-gray-200 dark:border-gray-700 pt-6">
        <h3 class="text-lg font-bold text-gray-900 dark:text-white mb-4">Recurring Schedules</h3>

        <!-- Add Schedule Form -->
        <div class="bg-blue-50 dark:bg-blue-900/20 p-4 rounded-xl mb-4 space-y-3">
          <div class="grid grid-cols-2 gap-3">
            <div>
              <label class="block text-sm font-semibold text-gray-700 dark:text-gray-300 mb-2">Day</label>
              <select [(ngModel)]="newSchedule.dayOfWeek"
                class="w-full px-4 py-2 border-2 border-gray-300 dark:border-gray-600 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-transparent dark:bg-gray-700 dark:text-white">
                <option *ngFor="let day of days" [value]="day.value">{{ day.label }}</option>
              </select>
            </div>
            <div>
              <label class="block text-sm font-semibold text-gray-700 dark:text-gray-300 mb-2">Time</label>
              <input type="time" [(ngModel)]="newSchedule.time"
                class="w-full px-4 py-2 border-2 border-gray-300 dark:border-gray-600 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-transparent dark:bg-gray-700 dark:text-white">
            </div>
          </div>
          <button (click)="addSchedule()" type="button"
            class="w-full px-4 py-2 bg-blue-600 text-white rounded-lg font-semibold hover:bg-blue-700 transition-all">
            Add Schedule
          </button>
        </div>

        <!-- Schedules List -->
        <div *ngIf="config.schedules.length > 0" class="space-y-2">
          <div *ngFor="let schedule of config.schedules; let i = index" 
            class="flex items-center justify-between p-3 bg-gray-100 dark:bg-gray-700 rounded-lg">
            <div class="flex items-center gap-3">
              <svg class="w-5 h-5 text-blue-600" fill="currentColor" viewBox="0 0 20 20">
                <path d="M6 2a1 1 0 000 2h8a1 1 0 100-2H6zM4 5a2 2 0 012-2h8a2 2 0 012 2v10a2 2 0 01-2 2H6a2 2 0 01-2-2V5z"/>
              </svg>
              <span class="font-semibold text-gray-900 dark:text-white">
                {{ getDayLabel(schedule.dayOfWeek) }} at {{ schedule.time }}
              </span>
            </div>
            <button (click)="removeSchedule(i)" type="button"
              class="p-2 text-red-600 hover:bg-red-100 dark:hover:bg-red-900/30 rounded-lg transition-all">
              <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/>
              </svg>
            </button>
          </div>
        </div>
        <div *ngIf="config.schedules.length === 0" class="text-center py-6 text-gray-500 dark:text-gray-400">
          No schedules added yet. Add one to get started.
        </div>
      </div>

      <!-- Actions -->
      <div class="flex gap-3 pt-6 border-t-2 border-gray-200 dark:border-gray-700">
        <button (click)="goBack()" type="button"
          class="flex-1 px-6 py-3 border-2 border-gray-300 dark:border-gray-600 text-gray-700 dark:text-gray-300 rounded-xl font-semibold hover:bg-gray-50 dark:hover:bg-gray-700 transition-all">
          Cancel
        </button>
        <button (click)="saveConfiguration()" [disabled]="saving"
          class="flex-1 px-6 py-3 bg-blue-600 text-white rounded-xl font-semibold hover:bg-blue-700 disabled:opacity-50 disabled:cursor-not-allowed transition-all">
          {{ saving ? 'Saving...' : 'Save Configuration' }}
        </button>
      </div>
    </div>
  </div>
</div>
