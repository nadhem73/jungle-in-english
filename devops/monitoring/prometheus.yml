  #         environment: 'docker'

  - job_name: 'api-gateway'
    metrics_path: '/actuator/prometheus'
    scrape_interval: 10s
    static_configs:
      - targets: ['api-gateway:8080']
        labels:
          application: 'api-gateway'
          service_type: 'gateway'
          environment: 'docker'

  # Core Business Services
