# Prometheus Configuration for EnglishFlow Microservices
# Complete monitoring setup for all services - Final Demo Ready

global:
  scrape_interval: 15s      # Scrape metrics every 15 seconds
  evaluation_interval: 15s  # Evaluate rules every 15 seconds
  external_labels:
    cluster: 'englishflow'
    environment: 'docker'

# Alerting configuration
alerting:
  alertmanagers:
    - static_configs:
        - targets: []
          # - 'alertmanager:9093'  # Uncomment if you set up Alertmanager

# Load alert rules
rule_files:
  - "alert-rules.yml"

# Scrape configurations
scrape_configs:
  # Prometheus itself (self-monitoring)
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']
        labels:
          application: 'prometheus'
          environment: 'docker'

  # Infrastructure Services
  - job_name: 'eureka-server'
    metrics_path: '/actuator/prometheus'
    scrape_interval: 10s
    static_configs:
      - targets: ['eureka-server:8761']
        labels:
          application: 'eureka-server'
          service_type: 'infrastructure'
          environment: 'docker'

  # Config server not deployed in current setup
  # - job_name: 'config-server'
  #   metrics_path: '/actuator/prometheus'
  #   scrape_interval: 10s
  #   static_configs:
  #     - targets: ['config-server:8888']
  #       labels:
  #         application: 'config-server'
