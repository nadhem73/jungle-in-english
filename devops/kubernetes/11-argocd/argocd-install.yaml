# ArgoCD Installation for EnglishFlow
# 
# To install ArgoCD, run:
# kubectl create namespace argocd
# kubectl apply -n argocd -f https://raw.githubusercontent.com/argoproj/argo-cd/stable/manifests/install.yaml
#
# Then apply this file to configure ArgoCD for EnglishFlow:
# kubectl apply -f argocd-install.yaml
#
# Access ArgoCD UI:
# kubectl port-forward svc/argocd-server -n argocd 8080:443
# Username: admin
# Password: kubectl -n argocd get secret argocd-initial-admin-secret -o jsonpath="{.data.password}" | base64 -d

---
apiVersion: v1
kind: Namespace
metadata:
  name: argocd
---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: englishflow
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/Khaalilabd/Esprit-PIDEV-4SAE1-2026-JungleInEnglish.git
    targetRevision: main
    path: devops/kubernetes
  destination:
    server: https://kubernetes.default.svc
    namespace: englishflow
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
      allowEmpty: false
    syncOptions:
    - CreateNamespace=true
    retry:
      limit: 5
      backoff:
        duration: 5s
        factor: 2
        maxDuration: 3m
