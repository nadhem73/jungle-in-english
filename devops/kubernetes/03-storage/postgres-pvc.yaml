apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: postgres-pvc
  namespace: englishflow
  labels:
    app: postgres
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 20Gi
  storageClassName: standard # Change based on your cloud provider
  # For AWS EKS: gp2 or gp3
  # For GCP GKE: standard or standard-rwo
  # For Azure AKS: default or managed-premium
  # For DigitalOcean: do-block-storage
