name: Pull Request Checks

on:
  pull_request:
    branches: [ main, develop ]

jobs:
  validate:
    name: Validate PR
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          fetch-depth: 0
      
      - name: Check PR title
        uses: amannn/action-semantic-pull-request@0723387faaf9b38adef4775cd42cfd5155ed6017 # v5.5.3
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          types: |
            feat
            fix
            docs
            style
            refactor
            perf
            test
            build
            ci
            chore
            revert
      
      - name: Check for merge conflicts
        run: |
          git fetch origin ${{ github.base_ref }}
          git merge-base --is-ancestor origin/${{ github.base_ref }} HEAD || {
            echo "Branch is not up to date with base branch"
            exit 1
          }
      
      - name: Check file sizes
        run: |
          large_files=$(find . -type f -size +10M -not -path "./.git/*" -not -path "*/node_modules/*" -not -path "*/target/*")
          if [ -n "$large_files" ]; then
            echo "Large files detected (>10MB):"
            echo "$large_files"
            exit 1
          fi
      
      - name: Check for secrets
        uses: trufflesecurity/trufflehog@d2b8889c2fcb9e617e94267d6d3a3e3e3e3e3e3e # main
        with:
          path: ./
          base: ${{ github.event.pull_request.base.sha }}
          head: ${{ github.event.pull_request.head.sha }}

  code-review:
    name: Automated Code Review
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      
      - name: Run Reviewdog
        uses: reviewdog/action-setup@3f401fe1d58fe77e10d665ab713057375e39b887 # v1.3.0
      
      - name: Java code review
        if: contains(github.event.pull_request.changed_files, 'backend/')
        run: |
          reviewdog -reporter=github-pr-review -filter-mode=nofilter
        env:
          REVIEWDOG_GITHUB_API_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      
      - name: TypeScript code review
        if: contains(github.event.pull_request.changed_files, 'frontend/')
        uses: reviewdog/action-eslint@v1
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          reporter: github-pr-review
          eslint_flags: 'frontend/src/**/*.ts'

  size-label:
    name: Label PR Size
    runs-on: ubuntu-latest
    
    steps:
      - name: Label based on size
        uses: codelytv/pr-size-labeler@56f6f0fc35c7cc0f72963b8467729e1c20bb6d2d # v1.10.1
        with:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          xs_label: 'size/xs'
          xs_max_size: 10
          s_label: 'size/s'
          s_max_size: 100
          m_label: 'size/m'
          m_max_size: 500
          l_label: 'size/l'
          l_max_size: 1000
          xl_label: 'size/xl'

  comment-summary:
    name: Comment Test Summary
    runs-on: ubuntu-latest
    needs: [validate, code-review]
    if: always()
    
    steps:
      - name: Comment PR
        uses: actions/github-script@60a0d83039c74a4aee543508d2ffcb1c3799cdea # v7.0.1
        with:
          script: |
            const { data: checks } = await github.rest.checks.listForRef({
              owner: context.repo.owner,
              repo: context.repo.repo,
              ref: context.payload.pull_request.head.sha
            });
            
            const summary = checks.check_runs
              .map(check => `- ${check.name}: ${check.conclusion}`)
              .join('\n');
            
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `## CI/CD Summary\n\n${summary}`
            });
